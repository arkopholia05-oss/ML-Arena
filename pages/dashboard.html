<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | ML-Arena</title>

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

<div class="dashboard-container">

    <aside class="sidebar">

        <div class="logo">
            <h2>🎮 ML-Arena</h2>
        </div>

        <nav>

            <a href="#" class="active">🏠 Dashboard</a>
            <a href="#">🏆 Tournaments</a>
            <a href="#">👥 Teams</a>
            <a href="#">👤 Profile</a>
            <a href="#">⚙️ Settings</a>

        </nav>

        <button id="logoutBtn">🚪 Logout</button>

    </aside>

    <main class="content">

        <div class="welcome-card">

            <h1 id="welcomeText">Welcome</h1>

            <p id="userEmail"></p>

            <p id="userRole"></p>

        </div>

        <div class="stats">

            <div class="card">
                <h2>25</h2>
                <p>Tournaments</p>
            </div>

            <div class="card">
                <h2>12</h2>
                <p>Wins</p>
            </div>

            <div class="card">
                <h2>5</h2>
                <p>Teams</p>
            </div>

        </div>

    </main>

</div>

<script type="module" src="../js/dashboard.js"></script>

</body>
</html>
